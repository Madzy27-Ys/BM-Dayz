<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Market</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

:root{
  --bg1:#05070f;
  --bg2:#0b1430;
  --card:rgba(255,255,255,0.06);
  --stroke:rgba(255,255,255,0.10);
  --text:#eaf1ff;
  --muted:rgb(159, 178, 208);
  --accent:#4da3ff;
  --good:#2ee59d;
  --danger:#ff4d4d;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  color:var(--text);
  background:radial-gradient(circle at top,#152b5c,#05070f 60%);
  min-height:100vh;
}

header{
  position:sticky;
  top:0;
  z-index:10;
  padding:18px 26px;
  backdrop-filter:blur(18px);
  background:rgba(10,15,30,0.55);
  border-bottom:1px solid var(--stroke);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav{
  display:flex;
  gap:10px;
}

.nav-btn{
  text-decoration:none;
  padding:10px 16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:var(--text);
  font-weight:600;
  transition:0.2s;
}

.nav-btn:hover{
  background:rgba(255,255,255,0.12);
}

.nav-btn.active{
  background:rgba(77,163,255,0.20);
  border-color:rgba(77,163,255,0.4);
}

.wrap{
  display:grid;
  grid-template-columns:1fr 340px;
  gap:20px;
  padding:22px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

.card{
  position:relative;
  padding:16px;
  border-radius:18px;
  background:var(--card);
  border:1px solid var(--stroke);
  backdrop-filter:blur(14px);
  transition:0.25s;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:-40%;
  right:-40%;
  width:200px;
  height:200px;
  background:radial-gradient(circle, rgba(77,163,255,0.25), transparent 70%);
  transform:rotate(25deg);
}

.card:hover{
  transform:translateY(-6px);
  border-color:rgba(77,163,255,0.4);
}

.card h3{
  margin:10px 0 6px;
  font-size:16px;
}

.prices{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
  margin-top:12px;
}

.btn{
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:var(--text);
  font-weight:600;
  font-size:12px;
  cursor:pointer;
}

.price-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:15px;
  font-weight:700;
  min-height:55px;
}

aside{
  position:sticky;
  top:90px;
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--stroke);
  height:fit-content;
}

.row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.small{
  color:var(--muted);
  font-size:13px;
}

.total{
  font-size:22px;
  font-weight:800;
  color:var(--good);
}

.qty-input{
  width:60px;
  margin-left:6px;
  padding:4px 6px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:white;
}

.delete-btn{
  margin-left:8px;
  background:none;
  border:none;
  color:#ff6b6b;
  cursor:pointer;
  font-size:16px;
}

.danger{
  width:100%;
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#ff3b3b,#ff6b6b);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

@media(max-width:900px){
  .wrap{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <nav class="nav">
    <a href="index.html" class="nav-btn active">Black Market</a>
    <a href="event.html" class="nav-btn">Event</a>
  </nav>
</header>

<div class="wrap">

  <main>
    <div id="list" class="grid"></div>
  </main>

  <aside>
    <h2>Total</h2>

    <div id="cart"></div>

    <p>Total : <span id="total" class="total">0 €</span></p>

    <div style="display:grid;gap:8px;margin-top:10px;">
      <button class="btn" onclick="setDiscount(1)">Prix normal</button>
      <button class="btn" onclick="setDiscount(0.80)">80% du prix</button>
    </div>

    <button class="danger" onclick="resetCart()">Vider</button>
  </aside>

</div>

<script>

let data = [
  {name:'Aqua FPS Teddy',price:20000},
  {name:'Carte mémoire rétro',price:20000},
  {name:'Cartouche GameBoy',price:20000},
  {name:'Cat Statue',price:25000},
  {name:'Clé USB',price:10000},
  {name:'Collier Croix Diamant',price:5000},
  {name:'Disque Dur (Bleu & Blanc)',price:15000},
  {name:'Disque Dur (Noir)',price:20000},
  {name:'Disquette 1999',price:20000},
  {name:'Dossier Intel',price:20000},
  {name:'GP Coin',price:7000},
  {name:'Jouet rétro',price:7500},
  {name:'KEK Tape',price:5000},
  {name:'LEDX',price:50000},
  {name:'Mobile Phone',price:5000},
  {name:'Montre de Poche',price:12000},
  {name:'Moonshine',price:15000},
  {name:'Ours en Peluche',price:2000},
  {name:'Pokemon Card',price:20000},
  {name:'Polaroid Photo',price:2000},
  {name:'RAM',price:10000},
  {name:'Smartphone',price:5000},
  {name:'Tetriz',price:10000},
  {name:'VPX Flash Module',price:15000},
  {name:'Masque Aztek',price:5500},
  {name:'Carte Aztek',price:500}
];

let cart = [];
let discount = 1;

const list = document.getElementById("list");
const cartDiv = document.getElementById("cart");
const total = document.getElementById("total");

function money(n){
  return n.toLocaleString('fr-FR') + ' €';
}

function render(){

  list.innerHTML = data.map(item => `
    <div class="card">

      <h3>${item.name}</h3>

      <div class="prices">
        <button 
          class="btn price-btn"
          onclick="addItem('${item.name}', ${item.price})"
        >
          ${money(item.price)}
        </button>
      </div>

    </div>
  `).join('');
}

function addItem(name, price){

  const found = cart.find(item => item.name === name);

  if(found){
    found.qty += 1;
  }else{
    cart.push({
      name,
      price,
      qty:1
    });
  }

  drawCart();
}

function changeQty(index, value){

  const qty = Number(value);

  cart[index].qty = (!qty || qty < 1)
    ? 1
    : qty;

  drawCart();
}

function setDiscount(value){
  discount = value;
  drawCart();
}

function del(index){
  cart.splice(index,1);
  drawCart();
}

function resetCart(){
  cart = [];
  drawCart();
}

function drawCart(){

  const base = cart.reduce((total,item)=>{
    return total + (item.price * item.qty);
  },0);

  const final = Math.round(base * discount);

  cartDiv.innerHTML = cart.map((item,index)=>`

    <div class="row">

      <div>
        <b>${item.name}</b>

        <div class="small">
          ${money(item.price)} ×

          <input
            class="qty-input"
            type="number"
            min="1"
            value="${item.qty}"
            onchange="changeQty(${index}, this.value)"
          >
        </div>
      </div>

      <div>
        ${money(item.price * item.qty)}

        <button
          class="delete-btn"
          onclick="del(${index})"
        >
          ❌
        </button>
      </div>

    </div>

  `).join('');

  if(cart.length === 0){
    cartDiv.innerHTML = '<p class="small">Vide</p>';
  }

  total.textContent = money(final);
}

render();
drawCart();

</script>

</body>
</html>
